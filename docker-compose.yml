services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5488:5432"
    environment:
      POSTGRES_USER: dotaz
      POSTGRES_PASSWORD: dotaz
      POSTGRES_DB: dotaz_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dotaz"]
      interval: 1s
      timeout: 3s
      retries: 10

  mariadb:
    image: mariadb:11
    ports:
      - "3388:3306"
    environment:
      MARIADB_ROOT_PASSWORD: dotaz
      MARIADB_USER: dotaz
      MARIADB_PASSWORD: dotaz
      MARIADB_DATABASE: dotaz_test
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 1s
      timeout: 3s
      retries: 10
